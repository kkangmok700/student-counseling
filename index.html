<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>지도교수 상담 신청</title>
  <link rel="stylesheet" href="css/style.css">
</head>
<body>
  <div class="container">
    <div class="header">
      <h1>지도교수 상담 신청</h1>
      <p>아래 양식을 작성하여 제출해 주세요</p>
    </div>

    <!-- 신청 폼 -->
    <div class="card" id="formCard">
      <form id="studentForm">
        <div class="form-group">
          <label>이름 <span class="required">*</span></label>
          <input type="text" id="name" placeholder="홍길동" required>
        </div>

        <div class="form-group">
          <label>학년 <span class="required">*</span></label>
          <select id="grade" required>
            <option value="">학년을 선택하세요</option>
            <option value="1">1학년</option>
            <option value="2">2학년</option>
            <option value="3">3학년</option>
            <option value="4">4학년</option>
          </select>
        </div>

        <div class="form-group">
          <label>취업 희망 분야 <span class="required">*</span></label>
          <input type="text" id="desiredField" placeholder="예: 웹 개발, 데이터 분석, 공공기관 등" required>
        </div>

        <div class="form-group">
          <label>교수님과 대화하고 싶은 주제 <span class="required">*</span></label>
          <textarea id="discussionTopic" placeholder="상담하고 싶은 내용을 자유롭게 작성해 주세요" required></textarea>
        </div>

        <button type="submit" class="btn btn-primary" id="submitBtn">제출하기</button>
      </form>
    </div>

    <!-- 성공 메시지 -->
    <div class="card success-message" id="successCard">
      <div class="icon">&#10004;&#65039;</div>
      <h2>제출 완료!</h2>
      <p>상담 신청이 정상적으로 접수되었습니다.<br>감사합니다.</p>
    </div>
  </div>

  <div class="toast" id="toast"></div>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="js/config.js"></script>
  <script>
    const form = document.getElementById('studentForm');
    const formCard = document.getElementById('formCard');
    const successCard = document.getElementById('successCard');
    const submitBtn = document.getElementById('submitBtn');

    function showToast(message) {
      const toast = document.getElementById('toast');
      toast.textContent = message;
      toast.classList.add('show');
      setTimeout(() => toast.classList.remove('show'), 3000);
    }

    form.addEventListener('submit', async (e) => {
      e.preventDefault();

      const name = document.getElementById('name').value.trim();
      const grade = document.getElementById('grade').value;
      const desiredField = document.getElementById('desiredField').value.trim();
      const discussionTopic = document.getElementById('discussionTopic').value.trim();

      if (!name || !grade || !desiredField || !discussionTopic) {
        showToast('모든 항목을 입력해 주세요');
        return;
      }

      submitBtn.disabled = true;
      submitBtn.textContent = '제출 중...';

      const { error } = await supabase
        .from('students')
        .insert([{
          name,
          grade,
          desired_field: desiredField,
          discussion_topic: discussionTopic
        }]);

      if (error) {
        console.error(error);
        showToast('제출 중 오류가 발생했습니다. 다시 시도해 주세요.');
        submitBtn.disabled = false;
        submitBtn.textContent = '제출하기';
        return;
      }

      formCard.style.display = 'none';
      successCard.style.display = 'block';
    });
  </script>
</body>
</html>
