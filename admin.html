<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>학생 상담 관리</title>
  <link rel="stylesheet" href="css/style.css">
</head>
<body>
  <!-- 로그인 화면 -->
  <div class="container" id="loginSection">
    <div class="header">
      <h1>학생 상담 관리</h1>
      <p>관리자 비밀번호를 입력하세요</p>
    </div>
    <div class="card login-box">
      <div class="icon">&#128274;</div>
      <div class="form-group">
        <label>비밀번호</label>
        <input type="password" id="passwordInput" placeholder="****" autofocus>
        <p class="error-text" id="errorText">비밀번호가 올바르지 않습니다</p>
      </div>
      <button class="btn btn-primary" id="loginBtn" onclick="handleLogin()">로그인</button>
    </div>
  </div>

  <!-- 관리자 대시보드 -->
  <div class="container wide dashboard" id="dashboardSection">
    <div class="header">
      <h1>학생 상담 관리</h1>
      <p>지도학생 상담 신청 내역</p>
    </div>

    <!-- 통계 -->
    <div class="stats-bar">
      <div class="stat-item">
        <div class="number" id="totalCount">0</div>
        <div class="label">전체</div>
      </div>
      <div class="stat-item">
        <div class="number" id="grade1Count">0</div>
        <div class="label">1학년</div>
      </div>
      <div class="stat-item">
        <div class="number" id="grade2Count">0</div>
        <div class="label">2학년</div>
      </div>
      <div class="stat-item">
        <div class="number" id="grade3Count">0</div>
        <div class="label">3학년</div>
      </div>
      <div class="stat-item">
        <div class="number" id="grade4Count">0</div>
        <div class="label">4학년</div>
      </div>
    </div>

    <!-- 툴바 -->
    <div class="toolbar">
      <input type="text" id="searchInput" placeholder="이름 또는 희망 분야로 검색..." oninput="filterStudents()">
      <button class="btn btn-secondary" onclick="loadStudents()">새로고침</button>
      <button class="btn btn-secondary" onclick="exportCSV()">CSV 내보내기</button>
    </div>

    <!-- 테이블 -->
    <div class="table-wrap">
      <table>
        <thead>
          <tr>
            <th>이름</th>
            <th>학년</th>
            <th>취업 희망 분야</th>
            <th>대화 주제</th>
            <th>신청일</th>
            <th>관리</th>
          </tr>
        </thead>
        <tbody id="studentTable">
          <tr>
            <td colspan="6">
              <div class="loading"><div class="spinner"></div></div>
            </td>
          </tr>
        </tbody>
      </table>
    </div>
  </div>

  <!-- 상세보기 모달 -->
  <div class="modal-overlay" id="detailModal">
    <div class="modal">
      <h3 id="modalTitle">학생 상세 정보</h3>
      <div class="detail-row">
        <div class="label">이름</div>
        <div class="value" id="modalName"></div>
      </div>
      <div class="detail-row">
        <div class="label">학년</div>
        <div class="value" id="modalGrade"></div>
      </div>
      <div class="detail-row">
        <div class="label">취업 희망 분야</div>
        <div class="value" id="modalField"></div>
      </div>
      <div class="detail-row">
        <div class="label">교수님과 대화하고 싶은 주제</div>
        <div class="value" id="modalTopic"></div>
      </div>
      <div class="detail-row">
        <div class="label">신청일시</div>
        <div class="value" id="modalDate"></div>
      </div>
      <div class="modal-actions">
        <button class="btn btn-danger btn-sm" id="modalDeleteBtn">삭제</button>
        <button class="btn btn-secondary btn-sm" onclick="closeModal()">닫기</button>
      </div>
    </div>
  </div>

  <!-- 삭제 확인 모달 -->
  <div class="modal-overlay" id="deleteModal">
    <div class="modal" style="text-align: center;">
      <h3>정말 삭제하시겠습니까?</h3>
      <p style="color: #64748b; margin-bottom: 24px;">이 작업은 되돌릴 수 없습니다.</p>
      <div class="modal-actions" style="justify-content: center;">
        <button class="btn btn-secondary btn-sm" onclick="closeDeleteModal()">취소</button>
        <button class="btn btn-danger btn-sm" id="confirmDeleteBtn">삭제</button>
      </div>
    </div>
  </div>

  <div class="toast" id="toast"></div>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="js/config.js"></script>
  <script>
    let allStudents = [];
    let deleteTargetId = null;

    // 토스트
    function showToast(message) {
      const toast = document.getElementById('toast');
      toast.textContent = message;
      toast.classList.add('show');
      setTimeout(() => toast.classList.remove('show'), 3000);
    }

    // 로그인
    function handleLogin() {
      const pw = document.getElementById('passwordInput').value;
      if (pw === ADMIN_PASSWORD) {
        document.getElementById('loginSection').style.display = 'none';
        const dashboard = document.getElementById('dashboardSection');
        dashboard.classList.remove('dashboard');
        dashboard.style.display = 'block';
        loadStudents();
      } else {
        document.getElementById('errorText').style.display = 'block';
      }
    }

    document.getElementById('passwordInput').addEventListener('keydown', (e) => {
      if (e.key === 'Enter') handleLogin();
    });

    // 학생 목록 불러오기
    async function loadStudents() {
      const { data, error } = await supabaseClient
        .from('students')
        .select('*')
        .order('created_at', { ascending: false });

      if (error) {
        showToast('데이터를 불러오는 중 오류가 발생했습니다');
        console.error(error);
        return;
      }

      allStudents = data || [];
      updateStats();
      renderTable(allStudents);
    }

    // 통계 업데이트
    function updateStats() {
      document.getElementById('totalCount').textContent = allStudents.length;
      for (let g = 1; g <= 4; g++) {
        const count = allStudents.filter(s => s.grade === String(g)).length;
        document.getElementById(`grade${g}Count`).textContent = count;
      }
    }

    // 테이블 렌더링
    function renderTable(students) {
      const tbody = document.getElementById('studentTable');

      if (students.length === 0) {
        tbody.innerHTML = `
          <tr><td colspan="6">
            <div class="empty-state">
              <div class="icon">&#128203;</div>
              <p>신청 내역이 없습니다</p>
            </div>
          </td></tr>`;
        return;
      }

      tbody.innerHTML = students.map(s => `
        <tr>
          <td><strong>${escapeHtml(s.name)}</strong></td>
          <td><span class="grade-badge grade-${s.grade}">${s.grade}학년</span></td>
          <td>${escapeHtml(s.desired_field)}</td>
          <td><div class="topic-text">${escapeHtml(s.discussion_topic)}</div></td>
          <td>${formatDate(s.created_at)}</td>
          <td>
            <div class="actions">
              <button class="btn btn-secondary btn-sm" onclick="showDetail('${s.id}')">상세</button>
              <button class="btn btn-danger btn-sm" onclick="showDeleteConfirm('${s.id}')">삭제</button>
            </div>
          </td>
        </tr>
      `).join('');
    }

    // 검색 필터
    function filterStudents() {
      const query = document.getElementById('searchInput').value.toLowerCase();
      const filtered = allStudents.filter(s =>
        s.name.toLowerCase().includes(query) ||
        s.desired_field.toLowerCase().includes(query) ||
        s.discussion_topic.toLowerCase().includes(query)
      );
      renderTable(filtered);
    }

    // 상세보기
    function showDetail(id) {
      const s = allStudents.find(x => x.id === id);
      if (!s) return;

      document.getElementById('modalTitle').textContent = `${s.name} 학생 상세 정보`;
      document.getElementById('modalName').textContent = s.name;
      document.getElementById('modalGrade').textContent = `${s.grade}학년`;
      document.getElementById('modalField').textContent = s.desired_field;
      document.getElementById('modalTopic').textContent = s.discussion_topic;
      document.getElementById('modalDate').textContent = formatDateTime(s.created_at);
      document.getElementById('modalDeleteBtn').onclick = () => {
        closeModal();
        showDeleteConfirm(id);
      };
      document.getElementById('detailModal').classList.add('active');
    }

    function closeModal() {
      document.getElementById('detailModal').classList.remove('active');
    }

    // 삭제
    function showDeleteConfirm(id) {
      deleteTargetId = id;
      document.getElementById('deleteModal').classList.add('active');
    }

    function closeDeleteModal() {
      deleteTargetId = null;
      document.getElementById('deleteModal').classList.remove('active');
    }

    document.getElementById('confirmDeleteBtn').addEventListener('click', async () => {
      if (!deleteTargetId) return;

      const { error } = await supabaseClient
        .from('students')
        .delete()
        .eq('id', deleteTargetId);

      closeDeleteModal();

      if (error) {
        showToast('삭제 중 오류가 발생했습니다');
        console.error(error);
        return;
      }

      showToast('삭제되었습니다');
      loadStudents();
    });

    // CSV 내보내기
    function exportCSV() {
      if (allStudents.length === 0) {
        showToast('내보낼 데이터가 없습니다');
        return;
      }

      const BOM = '\uFEFF';
      const header = '이름,학년,취업 희망 분야,대화 주제,신청일\n';
      const rows = allStudents.map(s =>
        `"${s.name}","${s.grade}학년","${s.desired_field.replace(/"/g, '""')}","${s.discussion_topic.replace(/"/g, '""')}","${formatDateTime(s.created_at)}"`
      ).join('\n');

      const blob = new Blob([BOM + header + rows], { type: 'text/csv;charset=utf-8;' });
      const url = URL.createObjectURL(blob);
      const a = document.createElement('a');
      a.href = url;
      a.download = `학생상담_${new Date().toISOString().slice(0, 10)}.csv`;
      a.click();
      URL.revokeObjectURL(url);
      showToast('CSV 파일이 다운로드되었습니다');
    }

    // 유틸
    function escapeHtml(str) {
      const div = document.createElement('div');
      div.textContent = str;
      return div.innerHTML;
    }

    function formatDate(dateStr) {
      return new Date(dateStr).toLocaleDateString('ko-KR');
    }

    function formatDateTime(dateStr) {
      return new Date(dateStr).toLocaleString('ko-KR');
    }

    // 모달 바깥 클릭 시 닫기
    document.getElementById('detailModal').addEventListener('click', (e) => {
      if (e.target === e.currentTarget) closeModal();
    });

    document.getElementById('deleteModal').addEventListener('click', (e) => {
      if (e.target === e.currentTarget) closeDeleteModal();
    });
  </script>
</body>
</html>
