<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>의료AI융합과 상담 관리</title>
  <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@300;400;500;600;700&display=swap" rel="stylesheet">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      font-family: 'Noto Sans KR', sans-serif;
      background: linear-gradient(135deg, #e0f2fe 0%, #f0f4f8 40%, #ede9fe 100%);
      min-height: 100vh;
      color: #1e293b;
    }

    /* ===== 로그인 ===== */
    .login-wrap {
      display: flex;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      padding: 20px;
    }

    .login-card {
      background: #fff;
      border-radius: 24px;
      padding: 48px 40px;
      width: 100%;
      max-width: 400px;
      box-shadow: 0 4px 24px rgba(0,0,0,0.06);
      text-align: center;
    }

    .login-card .lock-icon {
      width: 64px;
      height: 64px;
      background: linear-gradient(135deg, #3b82f6, #7c3aed);
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      margin: 0 auto 24px;
    }

    .login-card .lock-icon svg {
      width: 28px;
      height: 28px;
      color: #fff;
    }

    .login-card h2 {
      font-size: 22px;
      font-weight: 700;
      color: #1e293b;
      margin-bottom: 4px;
    }

    .login-card .subtitle {
      font-size: 13px;
      color: #94a3b8;
      margin-bottom: 28px;
    }

    .login-card input {
      width: 100%;
      padding: 14px 18px;
      border: 1.5px solid #e2e8f0;
      border-radius: 12px;
      font-size: 18px;
      font-family: 'Noto Sans KR', sans-serif;
      text-align: center;
      letter-spacing: 6px;
      background: #fafbfc;
      transition: all 0.2s;
    }

    .login-card input:focus {
      outline: none;
      border-color: #7c3aed;
      box-shadow: 0 0 0 3px rgba(124,58,237,0.12);
      background: #fff;
    }

    .login-card .error-msg {
      color: #ef4444;
      font-size: 13px;
      margin-top: 8px;
      display: none;
    }

    .login-card .login-btn {
      width: 100%;
      margin-top: 20px;
      padding: 14px;
      background: linear-gradient(135deg, #3b82f6, #7c3aed);
      color: #fff;
      border: none;
      border-radius: 12px;
      font-size: 16px;
      font-weight: 700;
      font-family: 'Noto Sans KR', sans-serif;
      cursor: pointer;
      transition: all 0.2s;
    }

    .login-card .login-btn:hover {
      transform: translateY(-2px);
      box-shadow: 0 6px 20px rgba(99,60,230,0.3);
    }

    /* ===== 대시보드 ===== */
    .dashboard-wrap {
      display: none;
      max-width: 1080px;
      margin: 0 auto;
      padding: 32px 20px 48px;
    }

    /* 헤더 */
    .dash-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 28px;
      flex-wrap: wrap;
      gap: 12px;
    }

    .dash-header-left {
      display: flex;
      align-items: center;
      gap: 14px;
    }

    .dash-header-left .logo {
      width: 44px;
      height: 44px;
      background: linear-gradient(135deg, #3b82f6, #7c3aed);
      border-radius: 14px;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .dash-header-left .logo svg {
      width: 22px;
      height: 22px;
      color: #fff;
    }

    .dash-header-left h1 {
      font-size: 22px;
      font-weight: 700;
      color: #1e293b;
    }

    .dash-header-left h1 span {
      background: linear-gradient(135deg, #3b82f6, #7c3aed);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
    }

    .dash-header-left .dept-tag {
      font-size: 12px;
      color: #94a3b8;
      margin-top: 2px;
    }

    .dash-header-right {
      display: flex;
      gap: 8px;
    }

    .icon-btn {
      display: flex;
      align-items: center;
      gap: 6px;
      padding: 10px 18px;
      border: 1.5px solid #e2e8f0;
      border-radius: 12px;
      background: #fff;
      font-size: 13px;
      font-weight: 600;
      font-family: 'Noto Sans KR', sans-serif;
      color: #475569;
      cursor: pointer;
      transition: all 0.2s;
    }

    .icon-btn:hover {
      border-color: #7c3aed;
      color: #7c3aed;
      background: #faf5ff;
    }

    .icon-btn svg {
      width: 16px;
      height: 16px;
    }

    /* 통계 카드 */
    .stats-row {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 14px;
      margin-bottom: 24px;
    }

    .stat-card {
      background: #fff;
      border-radius: 16px;
      padding: 20px 24px;
      box-shadow: 0 1px 4px rgba(0,0,0,0.04);
      position: relative;
      overflow: hidden;
    }

    .stat-card::before {
      content: '';
      position: absolute;
      top: 0;
      left: 0;
      right: 0;
      height: 3px;
    }

    .stat-card.total::before { background: linear-gradient(135deg, #3b82f6, #7c3aed); }
    .stat-card.g1::before { background: #3b82f6; }
    .stat-card.g2::before { background: #10b981; }

    .stat-card .stat-label {
      font-size: 12px;
      font-weight: 600;
      color: #94a3b8;
      text-transform: uppercase;
      letter-spacing: 0.5px;
      margin-bottom: 6px;
    }

    .stat-card .stat-number {
      font-size: 32px;
      font-weight: 700;
    }

    .stat-card.total .stat-number {
      background: linear-gradient(135deg, #3b82f6, #7c3aed);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
    }

    .stat-card.g1 .stat-number { color: #3b82f6; }
    .stat-card.g2 .stat-number { color: #10b981; }

    .stat-card .stat-suffix {
      font-size: 14px;
      font-weight: 500;
      color: #94a3b8;
      margin-left: 2px;
    }

    /* 검색바 */
    .search-bar {
      background: #fff;
      border-radius: 14px;
      padding: 14px 20px;
      display: flex;
      align-items: center;
      gap: 10px;
      margin-bottom: 16px;
      box-shadow: 0 1px 4px rgba(0,0,0,0.04);
    }

    .search-bar svg {
      width: 18px;
      height: 18px;
      color: #94a3b8;
      flex-shrink: 0;
    }

    .search-bar input {
      flex: 1;
      border: none;
      outline: none;
      font-size: 14px;
      font-family: 'Noto Sans KR', sans-serif;
      color: #1e293b;
      background: transparent;
    }

    .search-bar input::placeholder { color: #cbd5e1; }

    /* 테이블 */
    .table-card {
      background: #fff;
      border-radius: 16px;
      overflow: hidden;
      box-shadow: 0 1px 4px rgba(0,0,0,0.04);
    }

    table {
      width: 100%;
      border-collapse: collapse;
    }

    thead { background: #f8fafc; }

    th {
      padding: 14px 18px;
      text-align: left;
      font-size: 11px;
      font-weight: 700;
      color: #94a3b8;
      text-transform: uppercase;
      letter-spacing: 0.5px;
      border-bottom: 1.5px solid #f1f5f9;
    }

    td {
      padding: 16px 18px;
      font-size: 14px;
      border-bottom: 1px solid #f8fafc;
      vertical-align: middle;
    }

    tr:last-child td { border-bottom: none; }
    tr:hover { background: #faf5ff; }

    td strong {
      font-weight: 600;
      color: #1e293b;
    }

    .grade-pill {
      display: inline-block;
      padding: 4px 12px;
      border-radius: 20px;
      font-size: 12px;
      font-weight: 600;
    }

    .grade-pill.g1 { background: #dbeafe; color: #1d4ed8; }
    .grade-pill.g2 { background: #d1fae5; color: #059669; }
    .grade-pill.g3 { background: #fef3c7; color: #d97706; }
    .grade-pill.g4 { background: #fce7f3; color: #db2777; }

    .topic-preview {
      max-width: 220px;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
      color: #64748b;
      font-size: 13px;
    }

    .date-text {
      color: #94a3b8;
      font-size: 13px;
    }

    .row-actions {
      display: flex;
      gap: 6px;
    }

    .row-btn {
      padding: 6px 14px;
      border-radius: 8px;
      border: none;
      font-size: 12px;
      font-weight: 600;
      font-family: 'Noto Sans KR', sans-serif;
      cursor: pointer;
      transition: all 0.15s;
    }

    .row-btn.view {
      background: #f1f5f9;
      color: #475569;
    }

    .row-btn.view:hover {
      background: #ede9fe;
      color: #7c3aed;
    }

    .row-btn.del {
      background: #fef2f2;
      color: #dc2626;
    }

    .row-btn.del:hover {
      background: #fee2e2;
    }

    /* 빈 상태 */
    .empty-box {
      text-align: center;
      padding: 56px 24px;
    }

    .empty-box svg {
      width: 48px;
      height: 48px;
      color: #cbd5e1;
      margin-bottom: 12px;
    }

    .empty-box p {
      color: #94a3b8;
      font-size: 15px;
    }

    /* 모달 */
    .modal-bg {
      display: none;
      position: fixed;
      inset: 0;
      background: rgba(15,23,42,0.4);
      backdrop-filter: blur(6px);
      z-index: 100;
      justify-content: center;
      align-items: center;
    }

    .modal-bg.active { display: flex; }

    .modal-box {
      background: #fff;
      border-radius: 20px;
      padding: 36px;
      max-width: 520px;
      width: 90%;
      max-height: 80vh;
      overflow-y: auto;
      box-shadow: 0 24px 64px rgba(0,0,0,0.12);
    }

    .modal-box h3 {
      font-size: 18px;
      font-weight: 700;
      color: #1e293b;
      margin-bottom: 24px;
      display: flex;
      align-items: center;
      gap: 10px;
    }

    .modal-box h3 .modal-icon {
      width: 32px;
      height: 32px;
      background: linear-gradient(135deg, #3b82f6, #7c3aed);
      border-radius: 10px;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .modal-box h3 .modal-icon svg {
      width: 16px;
      height: 16px;
      color: #fff;
    }

    .detail-item {
      margin-bottom: 18px;
    }

    .detail-item .d-label {
      font-size: 11px;
      font-weight: 700;
      color: #94a3b8;
      text-transform: uppercase;
      letter-spacing: 0.5px;
      margin-bottom: 4px;
    }

    .detail-item .d-value {
      font-size: 15px;
      color: #1e293b;
      line-height: 1.7;
    }

    .modal-footer {
      display: flex;
      gap: 10px;
      justify-content: flex-end;
      margin-top: 28px;
      padding-top: 20px;
      border-top: 1px solid #f1f5f9;
    }

    .modal-btn {
      padding: 10px 20px;
      border-radius: 10px;
      border: none;
      font-size: 14px;
      font-weight: 600;
      font-family: 'Noto Sans KR', sans-serif;
      cursor: pointer;
      transition: all 0.15s;
    }

    .modal-btn.cancel {
      background: #f1f5f9;
      color: #475569;
    }

    .modal-btn.cancel:hover { background: #e2e8f0; }

    .modal-btn.danger {
      background: #fef2f2;
      color: #dc2626;
    }

    .modal-btn.danger:hover { background: #fee2e2; }

    /* 삭제 확인 모달 */
    .confirm-box {
      text-align: center;
      padding: 8px 0;
    }

    .confirm-box .warn-icon {
      width: 56px;
      height: 56px;
      background: #fef2f2;
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      margin: 0 auto 16px;
    }

    .confirm-box .warn-icon svg {
      width: 28px;
      height: 28px;
      color: #dc2626;
    }

    .confirm-box h3 {
      justify-content: center;
      margin-bottom: 8px;
    }

    .confirm-box p {
      color: #64748b;
      font-size: 14px;
      margin-bottom: 24px;
    }

    .confirm-box .modal-footer {
      justify-content: center;
      border-top: none;
      margin-top: 0;
      padding-top: 0;
    }

    /* 토스트 */
    .toast {
      position: fixed;
      bottom: 24px;
      left: 50%;
      transform: translateX(-50%) translateY(100px);
      background: #1e293b;
      color: #fff;
      padding: 12px 24px;
      border-radius: 12px;
      font-size: 14px;
      z-index: 200;
      transition: transform 0.3s ease;
      box-shadow: 0 8px 24px rgba(0,0,0,0.2);
    }

    .toast.show {
      transform: translateX(-50%) translateY(0);
    }

    /* 로딩 */
    .spinner {
      display: inline-block;
      width: 28px;
      height: 28px;
      border: 3px solid #e2e8f0;
      border-top-color: #7c3aed;
      border-radius: 50%;
      animation: spin 0.7s linear infinite;
    }

    @keyframes spin { to { transform: rotate(360deg); } }

    /* 반응형 */
    @media (max-width: 768px) {
      .stats-row { grid-template-columns: repeat(3, 1fr); gap: 8px; }
      .stat-card { padding: 14px 16px; }
      .stat-card .stat-number { font-size: 24px; }
      .dash-header { flex-direction: column; align-items: flex-start; }
      th, td { padding: 12px 14px; }
      .topic-preview { max-width: 140px; }
      .login-card { padding: 36px 28px; }
      .modal-box { padding: 28px 24px; }
    }

    @media (max-width: 640px) {
      .stats-row { grid-template-columns: 1fr 1fr 1fr; }
      .dash-header-right { width: 100%; }
      .icon-btn { flex: 1; justify-content: center; }
    }
  </style>
</head>
<body>
  <!-- ===== 로그인 ===== -->
  <div class="login-wrap" id="loginSection">
    <div class="login-card">
      <div class="lock-icon">
        <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="2" stroke="currentColor">
          <path stroke-linecap="round" stroke-linejoin="round" d="M16.5 10.5V6.75a4.5 4.5 0 1 0-9 0v3.75m-.75 11.25h10.5a2.25 2.25 0 0 0 2.25-2.25v-6.75a2.25 2.25 0 0 0-2.25-2.25H6.75a2.25 2.25 0 0 0-2.25 2.25v6.75a2.25 2.25 0 0 0 2.25 2.25Z"/>
        </svg>
      </div>
      <h2>관리자 로그인</h2>
      <p class="subtitle">의료AI융합과 상담 관리 시스템</p>
      <input type="password" id="passwordInput" placeholder="****" autofocus>
      <p class="error-msg" id="errorText">비밀번호가 올바르지 않습니다</p>
      <button class="login-btn" onclick="handleLogin()">로그인</button>
    </div>
  </div>

  <!-- ===== 대시보드 ===== -->
  <div class="dashboard-wrap" id="dashboardSection">
    <!-- 헤더 -->
    <div class="dash-header">
      <div class="dash-header-left">
        <div class="logo">
          <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="2" stroke="currentColor">
            <path stroke-linecap="round" stroke-linejoin="round" d="M9.75 3.104v5.714a2.25 2.25 0 0 1-.659 1.591L5 14.5M9.75 3.104c-.251.023-.501.05-.75.082m.75-.082a24.301 24.301 0 0 1 4.5 0m0 0v5.714a2.25 2.25 0 0 0 .659 1.591L19 14.5M14.25 3.104c.251.023.501.05.75.082M19 14.5l-2.47 2.47a2.25 2.25 0 0 1-1.591.659H9.061a2.25 2.25 0 0 1-1.591-.659L5 14.5m14 0V19a2.25 2.25 0 0 1-2.25 2.25H7.25A2.25 2.25 0 0 1 5 19v-4.5"/>
          </svg>
        </div>
        <div>
          <h1><span>상담</span> 관리</h1>
          <div class="dept-tag">의료AI융합과 김경목 교수</div>
        </div>
      </div>
      <div class="dash-header-right">
        <button class="icon-btn" onclick="loadStudents()">
          <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="2" stroke="currentColor">
            <path stroke-linecap="round" stroke-linejoin="round" d="M16.023 9.348h4.992v-.001M2.985 19.644v-4.992m0 0h4.992m-4.993 0 3.181 3.183a8.25 8.25 0 0 0 13.803-3.7M4.031 9.865a8.25 8.25 0 0 1 13.803-3.7l3.181 3.182"/>
          </svg>
          새로고침
        </button>
        <button class="icon-btn" onclick="exportCSV()">
          <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="2" stroke="currentColor">
            <path stroke-linecap="round" stroke-linejoin="round" d="M3 16.5v2.25A2.25 2.25 0 0 0 5.25 21h13.5A2.25 2.25 0 0 0 21 18.75V16.5M16.5 12 12 16.5m0 0L7.5 12m4.5 4.5V3"/>
          </svg>
          CSV
        </button>
      </div>
    </div>

    <!-- 통계 -->
    <div class="stats-row">
      <div class="stat-card total">
        <div class="stat-label">전체 신청</div>
        <div><span class="stat-number" id="totalCount">0</span><span class="stat-suffix">명</span></div>
      </div>
      <div class="stat-card g1">
        <div class="stat-label">1학년</div>
        <div><span class="stat-number" id="grade1Count">0</span><span class="stat-suffix">명</span></div>
      </div>
      <div class="stat-card g2">
        <div class="stat-label">2학년</div>
        <div><span class="stat-number" id="grade2Count">0</span><span class="stat-suffix">명</span></div>
      </div>
    </div>

    <!-- 검색 -->
    <div class="search-bar">
      <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="2" stroke="currentColor">
        <path stroke-linecap="round" stroke-linejoin="round" d="m21 21-5.197-5.197m0 0A7.5 7.5 0 1 0 5.196 5.196a7.5 7.5 0 0 0 10.607 10.607Z"/>
      </svg>
      <input type="text" id="searchInput" placeholder="이름, 희망 분야, 상담 주제로 검색..." oninput="filterStudents()">
    </div>

    <!-- 테이블 -->
    <div class="table-card">
      <table>
        <thead>
          <tr>
            <th>이름</th>
            <th>학년</th>
            <th>취업 희망 분야</th>
            <th>대화 주제</th>
            <th>신청일</th>
            <th>관리</th>
          </tr>
        </thead>
        <tbody id="studentTable">
          <tr>
            <td colspan="6" style="text-align:center;padding:40px;">
              <div class="spinner"></div>
            </td>
          </tr>
        </tbody>
      </table>
    </div>
  </div>

  <!-- ===== 상세보기 모달 ===== -->
  <div class="modal-bg" id="detailModal">
    <div class="modal-box">
      <h3>
        <div class="modal-icon">
          <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="2" stroke="currentColor">
            <path stroke-linecap="round" stroke-linejoin="round" d="M15.75 6a3.75 3.75 0 1 1-7.5 0 3.75 3.75 0 0 1 7.5 0ZM4.501 20.118a7.5 7.5 0 0 1 14.998 0"/>
          </svg>
        </div>
        <span id="modalTitle">학생 상세 정보</span>
      </h3>
      <div class="detail-item">
        <div class="d-label">이름</div>
        <div class="d-value" id="modalName"></div>
      </div>
      <div class="detail-item">
        <div class="d-label">학년</div>
        <div class="d-value" id="modalGrade"></div>
      </div>
      <div class="detail-item">
        <div class="d-label">취업 희망 분야</div>
        <div class="d-value" id="modalField"></div>
      </div>
      <div class="detail-item">
        <div class="d-label">교수님과 대화하고 싶은 주제</div>
        <div class="d-value" id="modalTopic"></div>
      </div>
      <div class="detail-item">
        <div class="d-label">신청일시</div>
        <div class="d-value" id="modalDate"></div>
      </div>
      <div class="modal-footer">
        <button class="modal-btn danger" id="modalDeleteBtn">삭제</button>
        <button class="modal-btn cancel" onclick="closeModal()">닫기</button>
      </div>
    </div>
  </div>

  <!-- ===== 삭제 확인 모달 ===== -->
  <div class="modal-bg" id="deleteModal">
    <div class="modal-box">
      <div class="confirm-box">
        <div class="warn-icon">
          <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="2" stroke="currentColor">
            <path stroke-linecap="round" stroke-linejoin="round" d="M12 9v3.75m-9.303 3.376c-.866 1.5.217 3.374 1.948 3.374h14.71c1.73 0 2.813-1.874 1.948-3.374L13.949 3.378c-.866-1.5-3.032-1.5-3.898 0L2.697 16.126ZM12 15.75h.007v.008H12v-.008Z"/>
          </svg>
        </div>
        <h3>정말 삭제하시겠습니까?</h3>
        <p>이 작업은 되돌릴 수 없습니다.</p>
        <div class="modal-footer">
          <button class="modal-btn cancel" onclick="closeDeleteModal()">취소</button>
          <button class="modal-btn danger" id="confirmDeleteBtn">삭제</button>
        </div>
      </div>
    </div>
  </div>

  <div class="toast" id="toast"></div>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="js/config.js"></script>
  <script>
    let allStudents = [];
    let deleteTargetId = null;

    function showToast(msg) {
      const t = document.getElementById('toast');
      t.textContent = msg;
      t.classList.add('show');
      setTimeout(() => t.classList.remove('show'), 3000);
    }

    // 로그인
    function handleLogin() {
      const pw = document.getElementById('passwordInput').value;
      if (pw === ADMIN_PASSWORD) {
        document.getElementById('loginSection').style.display = 'none';
        document.getElementById('dashboardSection').style.display = 'block';
        loadStudents();
      } else {
        document.getElementById('errorText').style.display = 'block';
      }
    }

    document.getElementById('passwordInput').addEventListener('keydown', e => {
      if (e.key === 'Enter') handleLogin();
    });

    // 데이터 로드
    async function loadStudents() {
      const { data, error } = await supabaseClient
        .from('students')
        .select('*')
        .order('created_at', { ascending: false });

      if (error) {
        showToast('데이터를 불러오는 중 오류가 발생했습니다');
        console.error(error);
        return;
      }

      allStudents = data || [];
      updateStats();
      renderTable(allStudents);
    }

    function updateStats() {
      document.getElementById('totalCount').textContent = allStudents.length;
      const g1 = allStudents.filter(s => s.grade === '1').length;
      const g2 = allStudents.filter(s => s.grade === '2').length;
      document.getElementById('grade1Count').textContent = g1;
      document.getElementById('grade2Count').textContent = g2;
    }

    function renderTable(students) {
      const tbody = document.getElementById('studentTable');

      if (students.length === 0) {
        tbody.innerHTML = `
          <tr><td colspan="6">
            <div class="empty-box">
              <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="1.5" stroke="currentColor">
                <path stroke-linecap="round" stroke-linejoin="round" d="M19.5 14.25v-2.625a3.375 3.375 0 0 0-3.375-3.375h-1.5A1.125 1.125 0 0 1 13.5 7.125v-1.5a3.375 3.375 0 0 0-3.375-3.375H8.25m2.25 0H5.625c-.621 0-1.125.504-1.125 1.125v17.25c0 .621.504 1.125 1.125 1.125h12.75c.621 0 1.125-.504 1.125-1.125V11.25a9 9 0 0 0-9-9Z"/>
              </svg>
              <p>신청 내역이 없습니다</p>
            </div>
          </td></tr>`;
        return;
      }

      tbody.innerHTML = students.map(s => `
        <tr>
          <td><strong>${esc(s.name)}</strong></td>
          <td><span class="grade-pill g${s.grade}">${s.grade}학년</span></td>
          <td>${esc(s.desired_field)}</td>
          <td><div class="topic-preview">${esc(s.discussion_topic)}</div></td>
          <td><span class="date-text">${fmtDate(s.created_at)}</span></td>
          <td>
            <div class="row-actions">
              <button class="row-btn view" onclick="showDetail('${s.id}')">상세</button>
              <button class="row-btn del" onclick="showDeleteConfirm('${s.id}')">삭제</button>
            </div>
          </td>
        </tr>
      `).join('');
    }

    function filterStudents() {
      const q = document.getElementById('searchInput').value.toLowerCase();
      const filtered = allStudents.filter(s =>
        s.name.toLowerCase().includes(q) ||
        s.desired_field.toLowerCase().includes(q) ||
        s.discussion_topic.toLowerCase().includes(q)
      );
      renderTable(filtered);
    }

    // 상세
    function showDetail(id) {
      const s = allStudents.find(x => x.id === id);
      if (!s) return;
      document.getElementById('modalTitle').textContent = `${s.name} 학생`;
      document.getElementById('modalName').textContent = s.name;
      document.getElementById('modalGrade').textContent = `${s.grade}학년`;
      document.getElementById('modalField').textContent = s.desired_field;
      document.getElementById('modalTopic').textContent = s.discussion_topic;
      document.getElementById('modalDate').textContent = fmtDateTime(s.created_at);
      document.getElementById('modalDeleteBtn').onclick = () => { closeModal(); showDeleteConfirm(id); };
      document.getElementById('detailModal').classList.add('active');
    }

    function closeModal() { document.getElementById('detailModal').classList.remove('active'); }

    // 삭제
    function showDeleteConfirm(id) {
      deleteTargetId = id;
      document.getElementById('deleteModal').classList.add('active');
    }

    function closeDeleteModal() {
      deleteTargetId = null;
      document.getElementById('deleteModal').classList.remove('active');
    }

    document.getElementById('confirmDeleteBtn').addEventListener('click', async () => {
      if (!deleteTargetId) return;
      const { error } = await supabaseClient.from('students').delete().eq('id', deleteTargetId);
      closeDeleteModal();
      if (error) { showToast('삭제 중 오류가 발생했습니다'); console.error(error); return; }
      showToast('삭제되었습니다');
      loadStudents();
    });

    // CSV
    function exportCSV() {
      if (allStudents.length === 0) { showToast('내보낼 데이터가 없습니다'); return; }
      const BOM = '\uFEFF';
      const header = '이름,학년,취업 희망 분야,대화 주제,신청일\n';
      const rows = allStudents.map(s =>
        `"${s.name}","${s.grade}학년","${s.desired_field.replace(/"/g,'""')}","${s.discussion_topic.replace(/"/g,'""')}","${fmtDateTime(s.created_at)}"`
      ).join('\n');
      const blob = new Blob([BOM + header + rows], { type: 'text/csv;charset=utf-8;' });
      const url = URL.createObjectURL(blob);
      const a = document.createElement('a');
      a.href = url;
      a.download = `학생상담_${new Date().toISOString().slice(0,10)}.csv`;
      a.click();
      URL.revokeObjectURL(url);
      showToast('CSV 파일이 다운로드되었습니다');
    }

    // 유틸
    function esc(str) { const d = document.createElement('div'); d.textContent = str; return d.innerHTML; }
    function fmtDate(d) { return new Date(d).toLocaleDateString('ko-KR'); }
    function fmtDateTime(d) { return new Date(d).toLocaleString('ko-KR'); }

    // 모달 바깥 클릭
    document.getElementById('detailModal').addEventListener('click', e => { if (e.target === e.currentTarget) closeModal(); });
    document.getElementById('deleteModal').addEventListener('click', e => { if (e.target === e.currentTarget) closeDeleteModal(); });
  </script>
</body>
</html>
